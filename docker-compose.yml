services:

  # ── MySQL 主库 + 42个社团库 ────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: muc_club_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-club123456}
      MYSQL_USER: mucclub
      MYSQL_PASSWORD: mucclub2025
      MYSQL_DATABASE: mucclub          # Docker 自动创建此库并授权给 mucclub 用户
    volumes:
      - db_data:/var/lib/mysql
      # init.sh 只在 db_data 为空（首次启动/purge后）时执行
      - ./scripts/docker-init/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./database/init/database_club_master_init.sql:/opt/sql/master.sql:ro
      - ./database/init/database_club_schema.sql:/opt/sql/schema.sql:ro
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      # 仅当 clubs 表中有数据时才标记 healthy（确保 init.sh 已执行完毕）
      test:
        [
          "CMD-SHELL",
          "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysql -uroot mucclub -e 'SELECT 1 FROM clubs LIMIT 1;' 2>/dev/null | grep -q 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 18          # 最多等 ~3 分钟
      start_period: 30s

  # ── Spring Boot 后端 ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: muc_club_backend:local
    container_name: muc_club_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy    # 等 DB healthy（即 init.sh 跑完）再启动
    environment:
      # 覆盖 application.yml 中的 localhost → docker 服务名 db
      SPRING_DATASOURCE_MASTER_URL: "jdbc:mysql://db:3306/mucclub?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_MASTER_USERNAME: mucclub
      SPRING_DATASOURCE_MASTER_PASSWORD: mucclub2025
      SPRING_DATASOURCE_CLUB_URL_PREFIX: "jdbc:mysql://db:3306/"
      SPRING_DATASOURCE_CLUB_URL_SUFFIX: "?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_CLUB_USERNAME: mucclub
      SPRING_DATASOURCE_CLUB_PASSWORD: mucclub2025
      FILE_UPLOAD_PATH: /app/uploads
      # 降低容器内日志噪声
      LOGGING_LEVEL_COM_CLUB_MANAGEMENT: INFO
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: WARN
    volumes:
      - uploads_data:/app/uploads
    working_dir: /app
    command: ["java", "-jar", "app.jar"]
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    healthcheck:
      # 用 bash 内置 /dev/tcp 做轻量端口探活，无需额外工具
      test: ["CMD", "bash", "-c", "echo >/dev/tcp/localhost/8081 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── nginx 前端静态服务 ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: muc_club_frontend:local
    container_name: muc_club_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./scripts/docker-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${FRONTEND_PORT:-80}:80"

# ── Named volumes ──────────────────────────────────────────────────────────────
# down  → 容器删除，卷保留 → 数据库数据和上传文件完整保留
# purge → docker compose down -v → 卷一并删除 → 下次 up 重新初始化
volumes:
  db_data:
  uploads_data:
